; Waveshare ESP32-S3-Touch-LCD-2.8C (480x480 rund, ST7701 RGB, GT911)
; VDO Quartz-Zeit Analoguhr + optionaler Spartan3-Hub Gateway-Client

[env:waveshare_s3_28c]
; pioarduino-Platform = Arduino-ESP32 Core 3.x (noetig fuer Arduino_GFX RGB)
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
upload_speed = 921600
monitor_speed = 115200

; ESP32-S3 mit PSRAM (RGB-Framebuffer 480x480x2 = 460 KB braucht PSRAM)
board_build.arduino.memory_type = qio_opi
board_build.flash_size = 16MB
board_build.partitions = default_16MB.csv
board_upload.flash_size = 16MB

build_flags =
  -D BOARD_HAS_PSRAM
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D LV_CONF_SKIP
  ; --- Spartan Hub BLE ---
  -D SPARTAN_HUB_NAME=\"Spartan3-Hub\"
  ; --- WiFi/NTP (optional, leer = nur RTC) ---
  -D HOME_WIFI_SSID=\"\"
  -D HOME_WIFI_PASSWORD=\"\"

lib_deps =
  moononournation/GFX Library for Arduino@^1.4.9
  h2zero/NimBLE-Arduino@^2.2.3
