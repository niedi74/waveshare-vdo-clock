; Waveshare ESP32-S3-Touch-LCD-2.8C (480x480 rund, ST7701 RGB, GT911)
; VDO Quartz-Zeit Analoguhr + optionaler Spartan3-Hub Gateway-Client

[env:waveshare_s3_28c]
; Skip static lib archive — NimBLE object list exceeds Windows ar.exe limit
lib_archive = no
; pioarduino-Platform = Arduino-ESP32 Core 3.x mit nativem ESP-IDF RGB-Panel
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
upload_speed = 921600
monitor_speed = 115200

; Serial-Monitor: KEIN RTS/DTR-Reset beim Connect.
; Sonst wird der ESP32-S3 jedes Mal resettet wenn man `pio device monitor`
; oeffnet (USB-CDC pulst RTS) -> Display wird kurz schwarz und das Bild
; ist dann erst nach komplettem Boot wieder da. Mit rts=0/dtr=0 bleibt
; der laufende Zustand erhalten.
monitor_rts = 0
monitor_dtr = 0

; Build-Skript: injiziert aktuelle PC-Zeit als RTC_BUILD_* Flags,
; damit der PCF85063 RTC beim Flashen auf die korrekte Zeit gesetzt wird.
extra_scripts = pre:scripts/inject_time.py

; ESP32-S3 mit PSRAM (RGB-Framebuffer 480x480x2 = 460 KB braucht PSRAM)
board_build.arduino.memory_type = qio_opi
board_build.flash_size = 16MB
board_build.partitions = default_16MB.csv
board_upload.flash_size = 16MB

build_flags =
  -D FEATURE_VERBOSE_SERIAL=0
  -D DEBUG_SERIAL=0
  -D BOARD_HAS_PSRAM
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D LV_CONF_SKIP
  ; --- Spartan Hub BLE ---
  -D SPARTAN_HUB_NAME=\"Spartan3-Hub\"
  ; --- WiFi/NTP (optional, leer = nur RTC) ---
  -D HOME_WIFI_SSID=\"\"
  -D HOME_WIFI_PASSWORD=\"\"
  -D CONFIG_ESP32S3_DATA_CACHE_LINE_64B=1
  -D CONFIG_SPIRAM_SPEED_120M=1
  -D CONFIG_LCD_RGB_RESTART_IN_VSYNC=1

lib_deps =
  h2zero/NimBLE-Arduino@^2.2.3
